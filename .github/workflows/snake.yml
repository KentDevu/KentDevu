name: GitHub Snake

on:
  schedule:
    - cron: '0 0 * * *'  # daily at midnight UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate Snake
        uses: platane/snk@v2
        with:
          github_user_name: KentDevu   # your GitHub username
          # outputs defaults to ./output by default, no need to set output_path

      - name: Commit & Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add ./output/github-contribution-grid-snake.svg
          git commit -m "Update Snake contribution" || echo "No changes to commit"
          git push
