name: GitHub Snake
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate Snake
        uses: platane/snk@v1.2.0
        with:
          github_user_name: KentDevu

      - name: Commit & Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          mkdir -p ./output
          git add ./output/github-contribution-grid-snake.svg
          git commit -m "Update Snake contribution" || echo "No changes to commit"
          git push
